<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keeladi Museum - Interactive 3D Viewer</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e67e22;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            /* Matches the index page padding to remove top gap */
            padding: 0 20px 40px 20px;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Matches the blurred background image from the index page */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/bg.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.3;
            /* Adjust this if you want it darker/lighter */
            filter: blur(8px);
            z-index: -1;
        }

        /* Frosted Glass Header matching the index page */
        .header-nav {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 40px;
            box-sizing: border-box;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
        }

        .back-btn {
            text-decoration: none;
            color: var(--primary-color);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 1.1em;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: var(--accent-color);
        }

        /* Header typography matching the index page */
        h1 {
            color: var(--primary-color);
            margin: 0;
            font-size: 1.8em;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.15);
        }

        /* The 3D Viewer Canvas */
        model-viewer {
            width: 100%;
            max-width: 800px;
            height: 60vh;
            min-height: 400px;
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            margin-bottom: 30px;
        }

        /* The AR Button inside the viewer */
        .ar-button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(230, 126, 34, 0.4);
            transition: background-color 0.3s, transform 0.2s;
        }

        .ar-button:hover {
            background-color: #d35400;
            transform: translateY(-2px);
        }

        /* The Selection Menu */
        .gallery-menu {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            max-width: 800px;
        }

        .artifact-btn {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            border: 2px solid white;
            color: var(--primary-color);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .artifact-btn:hover {
            border-color: var(--primary-color);
            background-color: white;
            transform: translateY(-2px);
        }

        .artifact-btn.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 4px 15px rgba(44, 62, 80, 0.3);
        }
    </style>
</head>

<body>

    <div class="header-nav">
        <a href="index.html" class="back-btn">← Back</a>
        <h1>Interactive Viewer</h1>
        <div style="width: 70px;"></div>
    </div>

    <model-viewer id="main-viewer" src="models/Bangle.glb" alt="A 3D model of an archaeological artifact" ar
        ar-modes="webxr scene-viewer quick-look" camera-controls auto-rotate shadow-intensity="1.5">

        <button slot="ar-button" class="ar-button">View in AR</button>
    </model-viewer>

    <div class="gallery-menu">
        <button class="artifact-btn active" onclick="switchModel('Bangle', this)">Bangle</button>
        <button class="artifact-btn" onclick="switchModel('bracelet', this)">Agate Beads</button>
        <button class="artifact-btn" onclick="switchModel('ceramicpot', this)">Ceramic Pot</button>
        <button class="artifact-btn" onclick="switchModel('Halfpot', this)">Red Slipped Storage Jar</button>
        <button class="artifact-btn" onclick="switchModel('kalvettu', this)">Thathapatti Memorial Stone</button>
        <button class="artifact-btn" onclick="switchModel('ring', this)">Carnelian Beads</button>
        <button class="artifact-btn" onclick="switchModel('statue', this)">Glass Beads Necklace</button>
    </div>

    <script>
        // 1. Function to switch the model when a bottom menu button is clicked
        function switchModel(fileName, clickedButton) {
            const viewer = document.getElementById('main-viewer');
            viewer.src = 'models/' + fileName + '.glb';

            const buttons = document.querySelectorAll('.artifact-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            clickedButton.classList.add('active');
        }

        // 2. Function to load the correct model when arriving from the index.html page
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const requestedModel = urlParams.get('model');

            if (requestedModel) {
                // Change the 3D model source
                const viewer = document.getElementById('main-viewer');
                viewer.src = 'models/' + requestedModel + '.glb';

                // Highlight the correct button in the bottom menu
                const buttons = document.querySelectorAll('.artifact-btn');
                buttons.forEach(btn => {
                    btn.classList.remove('active');
                    // Check if the button's onclick attribute contains the model name
                    if (btn.getAttribute('onclick').includes("'" + requestedModel + "'")) {
                        btn.classList.add('active');
                    }
                });
            }
        });
    </script>

</body>

</html>
