<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keeladi Museum - Digital Collection</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(45deg, #2c3e50, #e67e22, #d35400);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite; /* slowly animates the colors */
            margin: 0;
            padding: 40px 20px;
            color: white; /* Make overall text white */
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        /* CSS Grid for the 7 Cards */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            /* Semi-transparent white background */
            background: rgba(255, 255, 255, 0.85);
            /* Adds the blur effect behind the card */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 25px;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        /* Icon Placeholder Area */
        .card-icon {
            width: 100%;
            height: 200px;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* This keeps the image inside the rounded corners */
            margin-bottom: 15px;
        }

        .card-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* This ensures the image fills the box without looking squished */
            transition: transform 0.3s ease;
        }

        .card:hover .card-icon img {
            transform: scale(1.05);
        }

        .card h2 {
            margin: 0 0 15px 0;
            color: #2c3e50;
            font-size: 1.4em;
        }

        /* The Button */
        .btn-view {
            background-color: #e67e22;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .btn-view:hover {
            background-color: #d35400;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Keeladi Museum Digital Collection</h1>
        <p>Choose an artifact to explore in interactive 3D and Augmented Reality.</p>
    </div>

    <div class="grid-container">

        <div class="card">
            <div class="card-icon">
                <img src="images/bangle.jpeg" alt="Picture of a Bangle">
            </div>
            <h2>Bangle</h2>
            <a href="ar-gallery.html?model=Bangle" class="btn-view">Explore in 3D</a>
        </div>

        <div class="card">
            <div class="card-icon">
                <img src="images/bracelet.jpeg" alt="Picture of a Bracelet">
            </div>
            <h2>Bracelet</h2>
            <a href="ar-gallery.html?model=bracelet" class="btn-view">Explore in 3D</a>
        </div>

        <div class="card">
            <div class="card-icon">
                <img src="images/ceramicpot.jpeg" alt="Picture of a Ceramic Pot">
            </div>
            <h2>Ceramic Pot</h2>
            <a href="ar-gallery.html?model=ceramicpot" class="btn-view">Explore in 3D</a>
        </div>

        <div class="card">
            <div class="card-icon">
                <img src="images/halfpot.png" alt="Picture of a Half Pot">
            </div>
            <h2>Half Pot</h2>
            <a href="ar-gallery.html?model=Halfpot" class="btn-view">Explore in 3D</a>
        </div>

        <div class="card">
            <div class="card-icon">
                <img src="images/kalvettu.jpeg" alt="Picture of a Kalvettu">
            </div>
            <h2>Kalvettu</h2>
            <a href="ar-gallery.html?model=kalvettu" class="btn-view">Explore in 3D</a>
        </div>

        <div class="card">
            <div class="card-icon">
                <img src="images/ring.jpeg" alt="Picture of a Ring">
            </div>
            <h2>Ring</h2>
            <a href="ar-gallery.html?model=ring" class="btn-view">Explore in 3D</a>
        </div>

        <div class="card">
            <div class="card-icon">
                <img src="images/statue.jpeg" alt="Picture of a Statue">
            </div>
            <h2>Statue</h2>
            <a href="ar-gallery.html?model=statue" class="btn-view">Explore in 3D</a>
        </div>

    </div>

</body>

</html>
